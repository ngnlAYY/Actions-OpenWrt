name: OpenWrt Builder

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      projects:
        description: "要编译的项目"
        required: true
        default: "全部"
        type: choice
        options:
          - "全部"
          - "padavanonly-mt798x-6.6"
          - "hanwckf-mt798x"
          - "immortalwrt"
      use_cache:
        description: "是否使用缓存（dl + ccache）加速编译"
        required: false
        default: false
        type: boolean

env:
  # 可选：自定义 diy-part1.sh 脚本，留空则不使用
  DIY_P1_SH: diy-part1.sh
  # 可选：自定义 diy-part2.sh 脚本，留空则不使用
  DIY_P2_SH: diy-part2.sh
  # 可选：是否上传 bin 目录，留空则不上传
  UPLOAD_BIN_DIR: false
  # 可选：是否上传 firmware 目录，留空则不上传
  UPLOAD_FIRMWARE: true
  # 可选：是否上传 release 目录，留空则不上传
  UPLOAD_RELEASE: true
  # 可选：修改时区，留空则不修改
  TZ: Asia/Shanghai
  # 可选：修改默认 LAN IP（如 192.168.50.1），留空则不修改
  DEFAULT_IP: ""
  # 可选：修改默认主机名（如 MyRouter），留空则不修改
  DEFAULT_HOSTNAME: ""
  # 可选：修改 LAN 域名（如 mylan，则主机名解析为 hostname.mylan），留空则不修改
  LAN_DOMAIN: ""
  # 可选：修改默认 WiFi 名称（SSID），留空则不修改
  DEFAULT_WIFI_SSID: ""

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set_matrix
        run: |
          INPUT="${{ github.event.inputs.projects || '全部' }}"
          FULL='{"include":[{"project":"padavanonly-mt798x-6.6","repo_url":"https://github.com/padavanonly/immortalwrt-mt798x-6.6","repo_branch":"openwrt-24.10-6.6","feeds_conf":"projects/padavanonly-mt798x-6.6/feeds.conf.default","config_file":"projects/padavanonly-mt798x-6.6/.config"},{"project":"hanwckf-mt798x","repo_url":"https://github.com/hanwckf/immortalwrt-mt798x","repo_branch":"openwrt-21.02","feeds_conf":"projects/hanwckf-mt798x/feeds.conf.default","config_file":"projects/hanwckf-mt798x/.config"},{"project":"immortalwrt","repo_url":"https://github.com/immortalwrt/immortalwrt","repo_branch":"master","feeds_conf":"projects/immortalwrt/feeds.conf.default","config_file":"projects/immortalwrt/.config"}]}'
          if [ -z "$INPUT" ] || [ "$INPUT" = "全部" ] || [ "$INPUT" = "all" ]; then
            echo "matrix<<EOFM" >> $GITHUB_OUTPUT
            echo "$FULL" >> $GITHUB_OUTPUT
            echo "EOFM" >> $GITHUB_OUTPUT
            echo "Selected: all projects"
          else
            MATRIX=$(echo "$FULL" | jq --arg p "$INPUT" '.include |= map(select(.project == $p))')
            if [ "$(echo "$MATRIX" | jq '.include | length')" -eq 0 ]; then
              echo "::error::未匹配到任何项目，请检查 projects 输入。可选: padavanonly-mt798x-6.6, hanwckf-mt798x, immortalwrt"
              exit 1
            fi
            echo "matrix<<EOF" >> $GITHUB_OUTPUT
            echo "$MATRIX" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "Selected: $(echo "$MATRIX" | jq -r '.include[].project' | tr '\n' ' ')"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Clone source code
        working-directory: /workdir
        env:
          REPO_URL: ${{ matrix.repo_url }}
          REPO_BRANCH: ${{ matrix.repo_branch }}
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Restore dl cache
        if: github.event.inputs.use_cache == 'true'
        uses: actions/cache@v4
        with:
          path: openwrt/dl
          key: openwrt-dl-${{ matrix.project }}-${{ matrix.repo_branch }}
          restore-keys: |
            openwrt-dl-${{ matrix.project }}-

      - name: Load custom feeds
        env:
          FEEDS_CONF: ${{ matrix.feeds_conf }}
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds
        run: cd openwrt && ./scripts/feeds update -a

      - name: Install feeds
        run: cd openwrt && ./scripts/feeds install -a

      - name: Load custom configuration
        env:
          CONFIG_FILE: ${{ matrix.config_file }}
        run: |
          if [ ! -e "$CONFIG_FILE" ]; then
            echo "::error::Missing config: $CONFIG_FILE (add .config for this project or comment out this project in matrix)"
            exit 1
          fi
          [ -e files ] && mv files openwrt/files
          mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Restore ccache
        if: github.event.inputs.use_cache == 'true'
        uses: actions/cache@v4
        with:
          path: openwrt/.ccache
          key: openwrt-ccache-${{ matrix.project }}-${{ hashFiles(matrix.config_file) }}
          restore-keys: |
            openwrt-ccache-${{ matrix.project }}-

      - name: Enable ccache and compile the firmware
        id: compile
        env:
          USE_CACHE: ${{ github.event.inputs.use_cache }}
          CCACHE_DIR: ${{ github.event.inputs.use_cache == 'true' && format('{0}/openwrt/.ccache', github.workspace) || '' }}
          CCACHE_MAXSIZE: ${{ github.event.inputs.use_cache == 'true' && '5G' || '' }}
        run: |
          cd openwrt
          if [ "$USE_CACHE" = "true" ]; then
            grep -q 'CONFIG_CCACHE=y' .config || (echo 'CONFIG_CCACHE=y' >> .config && make defconfig)
          fi
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET_DEVICE_.*_DEVICE_.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAMES
          DEVICE_NAME_STR=$(paste -sd'_' DEVICE_NAMES)
          [ -n "$DEVICE_NAME_STR" ] && echo "DEVICE_NAME=_${DEVICE_NAME_STR}" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "PROJECT=${{ matrix.project }}" >> $GITHUB_ENV

      - name: Check space usage
        if: (!cancelled())
        run: df -hT

      - name: Upload bin directory
        uses: actions/upload-artifact@main
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
        with:
          name: OpenWrt_bin_${{ matrix.project }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: openwrt/bin

      - name: Organize files
        id: organize
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware directory
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: OpenWrt_firmware_${{ matrix.project }}${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: Generate release tag
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")_${{ matrix.project }}" >> $GITHUB_OUTPUT
          touch release.txt
          echo "Project: ${{ matrix.project }}" >> release.txt
          [ "${UPLOAD_GOFILE}" = "true" ] && [ -n "${{ steps.gofile.outputs.url }}" ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: Remove old Releases
        uses: dev-drprasad/delete-older-releases@master
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
